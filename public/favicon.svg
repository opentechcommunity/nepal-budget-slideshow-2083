<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc143c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003893;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001f5c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0e0b04" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Nepal flag inspired triangular shape (simplified) -->
  <path d="M 25 30 L 25 70 L 50 50 Z" fill="url(#redGradient)" stroke="url(#goldGradient)" stroke-width="1.5"/>
  <path d="M 25 30 L 25 55 L 42 42.5 Z" fill="url(#blueGradient)" stroke="url(#goldGradient)" stroke-width="1"/>
  
  <!-- Rupee symbol (₹) stylized -->
  <g transform="translate(55, 35)">
    <path d="M 2 0 L 18 0 M 2 6 L 18 6 M 8 0 L 8 6 C 8 12 12 16 18 16 L 18 20 L 2 20" 
          fill="none" 
          stroke="url(#goldGradient)" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- Small decorative stars (representing budget growth/prosperity) -->
  <circle cx="35" cy="40" r="1.5" fill="#f4d03f" opacity="0.8"/>
  <circle cx="40" cy="35" r="1" fill="#f4d03f" opacity="0.6"/>
  <circle cx="30" cy="48" r="1" fill="#f4d03f" opacity="0.6"/>
</svg>
